<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060f0a"/>
      <stop offset="100%" stop-color="#0a1812"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="100%" stop-color="#00c4d4"/>
    </linearGradient>
    <pattern id="dot" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#0f1e18"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- HR kanban board (right) -->
  <g opacity="0.2" transform="translate(840,50)">
    <!-- columns -->
    <rect x="0"   y="0" width="90" height="200" rx="8" fill="#0d1a14" stroke="#00e5a0" stroke-width="1"/>
    <rect x="100" y="0" width="90" height="200" rx="8" fill="#0d1a14" stroke="#00c4d4" stroke-width="1"/>
    <rect x="200" y="0" width="90" height="200" rx="8" fill="#0d1a14" stroke="#00e5a0" stroke-width="1"/>
    <rect x="300" y="0" width="90" height="200" rx="8" fill="#0d1a14" stroke="#00c4d4" stroke-width="1"/>
    <!-- column titles -->
    <text x="45"  y="22" font-family="sans-serif" font-size="11" fill="#00e5a0" text-anchor="middle">Screening</text>
    <text x="145" y="22" font-family="sans-serif" font-size="11" fill="#00c4d4" text-anchor="middle">Interview</text>
    <text x="245" y="22" font-family="sans-serif" font-size="11" fill="#00e5a0" text-anchor="middle">Assessment</text>
    <text x="345" y="22" font-family="sans-serif" font-size="11" fill="#00c4d4" text-anchor="middle">Offer</text>
    <!-- cards col 1 -->
    <rect x="8"  y="34" width="74" height="34" rx="5" fill="#112418" stroke="#00e5a0" stroke-width="1"/>
    <text x="45" y="52" font-family="sans-serif" font-size="10" fill="#d1fae5" text-anchor="middle">Ahmed K.</text>
    <rect x="8"  y="76" width="74" height="34" rx="5" fill="#112418" stroke="#00e5a0" stroke-width="1"/>
    <text x="45" y="94" font-family="sans-serif" font-size="10" fill="#d1fae5" text-anchor="middle">Sara M.</text>
    <!-- cards col 2 -->
    <rect x="108" y="34" width="74" height="34" rx="5" fill="#0f1f1c" stroke="#00c4d4" stroke-width="1"/>
    <text x="145" y="52" font-family="sans-serif" font-size="10" fill="#a5f3fc" text-anchor="middle">Omar H.</text>
    <!-- cards col 4 -->
    <rect x="308" y="34" width="74" height="34" rx="5" fill="#0f1f1c" stroke="#00e5a0" stroke-width="1" opacity="0.9"/>
    <text x="345" y="52" font-family="sans-serif" font-size="10" fill="#00e5a0" text-anchor="middle">Nour A. ✓</text>
    <!-- bottom badge -->
    <rect x="80" y="210" width="230" height="26" rx="13" fill="#00e5a0" opacity="0.18"/>
    <text x="195" y="228" font-family="sans-serif" font-size="12" fill="#00e5a0" text-anchor="middle">Free Forever · Open Source</text>
  </g>
  <!-- logo: people/team mark -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#050f0a" stroke="url(#acc)" stroke-width="3"/>
    <!-- Arabic ف (Fa) letterform simplified -->
    <text x="58" y="80" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="none" stroke="url(#acc)" stroke-width="3" text-anchor="middle">ف</text>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="sans-serif" font-size="14" fill="#00e5a0" opacity="0.6" letter-spacing="5">OPEN SOURCE HRMS</text>
  <text x="218" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="96" font-weight="900" letter-spacing="-3" fill="#f0fff8">Farik</text>
  <text x="222" y="215" font-family="sans-serif" font-size="19" fill="url(#acc)" letter-spacing="3" opacity="0.9">فريق · TEAM IN ARABIC · FREE FOREVER</text>
  <rect x="220" y="233" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="250" width="120" height="28" rx="14" fill="#00e5a0" opacity="0.15"/>
  <text x="282" y="269" font-family="sans-serif" font-size="13" fill="#00e5a0" text-anchor="middle">HR Platform</text>
  <rect x="354" y="250" width="120" height="28" rx="14" fill="#00c4d4" opacity="0.15"/>
  <text x="414" y="269" font-family="sans-serif" font-size="13" fill="#a5f3fc" text-anchor="middle">Supabase Auth</text>
  <rect x="486" y="250" width="110" height="28" rx="14" fill="#00e5a0" opacity="0.15"/>
  <text x="541" y="269" font-family="sans-serif" font-size="13" fill="#00e5a0" text-anchor="middle">MIT License</text>
</svg>